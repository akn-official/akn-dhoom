<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trak Fitness — Coaching-First Gym</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Oswald:wght@500;700&family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
:root {
  /* Ember — warm premium default */
  --bg: #F5EFE4;           /* cream */
  --bg-1: #EFE6D5;         /* soft sand */
  --bg-2: #E7DCC7;         /* paper */
  --line: #D9CCB4;
  --line-2: #B8A784;
  --ink: #1C120E;          /* rich espresso */
  --ink-dim: #6B5D51;
  --ink-faint: #9A8E80;
  --accent: #E8833A;       /* warm amber */
  --accent-deep: #B8561F;
  --accent-rgb: 232,131,58;
  --burgundy: #6E1E2B;     /* deep maroon */
  --burgundy-rgb: 110,30,43;
  --charcoal: #231915;
  --danger: #C23B2A;
  --font-display: 'Anton', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --grain-blend: multiply;
  --radius: 4px;
  --radius-lg: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; overflow-x: hidden; transition: background-color 0.4s ease, color 0.4s ease; }
body {
  background-image:
    radial-gradient(1200px 700px at 80% -10%, rgba(var(--accent-rgb),0.18), transparent 60%),
    radial-gradient(900px 500px at -10% 30%, rgba(var(--burgundy-rgb),0.08), transparent 60%);
}
body.no-grain::before { display: none !important; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* Grain overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 200;
  opacity: 0.08;
  mix-blend-mode: var(--grain-blend);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
}

/* Typography */
.display {
  font-family: var(--font-display);
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 0.88;
  text-transform: uppercase;
}
.mono { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; }
.eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink-dim); }

/* Layout */
.container { max-width: 1440px; margin: 0 auto; padding: 0 48px; }
@media (max-width: 768px) { .container { padding: 0 20px; } }

/* Section scaffolding */
.section { position: relative; padding: 140px 0; border-top: 1px solid var(--line); }
.section-alt { background: var(--bg-1); }
.section-burgundy { background: var(--burgundy); color: #F5EFE4; border-top-color: var(--burgundy); }
.section-burgundy .eyebrow, .section-burgundy .mono { color: rgba(245,239,228,0.6); }
.section-burgundy .section-title, .section-burgundy h2, .section-burgundy h3 { color: #F5EFE4; }
.section-head { display: grid; grid-template-columns: 140px 1fr; gap: 40px; margin-bottom: 80px; }
.section-head .idx { color: var(--accent); }
.section-title { font-size: clamp(48px, 8vw, 120px); }
@media (max-width: 768px) {
  .section { padding: 80px 0; }
  .section-head { grid-template-columns: 1fr; gap: 16px; margin-bottom: 48px; }
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 18px 28px;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 600;
  transition: all 0.25s ease;
  border: 1px solid transparent;
}
.btn-primary {
  background: var(--accent);
  color: #0A0A0A;
}
.btn-primary:hover { background: var(--ink); transform: translateY(-2px); box-shadow: 0 12px 40px -10px rgba(var(--accent-rgb),0.4); }
.btn-ghost {
  border-color: var(--ink);
  color: var(--ink);
  border-radius: var(--radius);
}
.btn-ghost:hover { background: var(--ink); color: var(--bg); }
.btn .arrow { transition: transform 0.25s ease; }
.btn:hover .arrow { transform: translateX(4px); }

/* Reveal animation */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1); }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* Divider line that draws in */
.draw-line { height: 1px; background: var(--line-2); position: relative; overflow: hidden; }
.draw-line::after {
  content: ''; position: absolute; inset: 0;
  background: var(--accent);
  transform: scaleX(0); transform-origin: left;
  transition: transform 1.2s cubic-bezier(.2,.7,.2,1);
}
.draw-line.visible::after { transform: scaleX(1); }

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 20px 48px;
  display: flex; justify-content: space-between; align-items: center;
  transition: all 0.3s ease;
}
.nav.scrolled {
  background: rgba(245,239,228,0.82);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 48px;
}
.logo { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); }
.nav-links { display: flex; gap: 32px; }
.nav-links a { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); transition: color 0.2s; }
.nav-links a:hover { color: var(--accent); }
.nav-cta { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; padding: 10px 18px; background: var(--burgundy); color: #FFF5E6; font-weight: 600; transition: all 0.2s; border-radius: var(--radius); }
.nav-cta:hover { background: var(--charcoal); }
@media (max-width: 1040px) {
  .nav-links { display: none; }
  .nav, .nav.scrolled { padding: 14px 20px; }
}

/* (old .hero block removed — see Hero, centered, cinematic below) */
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Marquee */
.marquee { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 28px 0; overflow: hidden; background: var(--burgundy); color: #F5EFE4; }
.marquee-track { display: flex; gap: 64px; white-space: nowrap; animation: scroll 40s linear infinite; }
.marquee-item { font-family: var(--font-display); font-size: 40px; text-transform: uppercase; letter-spacing: 0.02em; display: flex; align-items: center; gap: 64px; color: rgba(245,239,228,0.55); }
.marquee-item .sep { color: var(--accent); }
.marquee-item.strong { color: #F5EFE4; }
@keyframes scroll { to { transform: translateX(-50%); } }

/* Testimonials */
.testimonials-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.testimonial {
  background: var(--bg);
  padding: 40px 36px;
  display: flex; flex-direction: column; gap: 24px;
  min-height: 320px;
  position: relative;
  transition: background 0.3s;
}
.testimonial:hover { background: var(--bg-1); box-shadow: inset 4px 0 0 var(--accent); }
.testimonial:hover .quote-mark { color: var(--accent); }
.quote-mark { font-family: var(--font-display); font-size: 72px; line-height: 0.6; color: var(--line-2); transition: color 0.3s; }
.testimonial-body { font-size: 18px; line-height: 1.45; color: var(--ink); flex: 1; }
.testimonial-author { display: flex; align-items: center; gap: 12px; padding-top: 20px; border-top: 1px solid var(--line); }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-2); border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); }
.author-name { font-size: 14px; font-weight: 500; }
.author-meta { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-dim); }
@media (max-width: 900px) { .testimonials-grid { grid-template-columns: 1fr; } }

/* Why grid */
.why-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
.why-lead { grid-column: span 5; }
.why-lead h2 { font-size: clamp(56px, 7vw, 96px); }
.why-lead h2 .stroke { -webkit-text-stroke: 1.5px var(--ink); color: transparent; }
.why-items { grid-column: span 7; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); }
.why-item { background: var(--bg); padding: 36px 32px; min-height: 240px; display: flex; flex-direction: column; justify-content: space-between; transition: background 0.3s; }
.why-item:hover { background: var(--burgundy); color: #F5EFE4; transform: translateY(-2px); box-shadow: 0 12px 30px -12px rgba(var(--burgundy-rgb),0.4); }
.why-item:hover .why-num { color: var(--accent); }
.why-item:hover .why-item-sub { color: rgba(245,239,228,0.8); }
.why-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; color: var(--accent); transition: color 0.3s; }
.why-item h3 { font-family: var(--font-display); font-size: 36px; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1; margin: 16px 0; }
.why-item-sub { font-size: 14px; line-height: 1.5; color: var(--ink-dim); transition: color 0.3s; }
@media (max-width: 900px) {
  .why-lead, .why-items { grid-column: span 12; }
  .why-items { grid-template-columns: 1fr; }
}

/* Trainers */
.trainers-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.trainer {
  position: relative;
  cursor: pointer;
  overflow: hidden;
}
.trainer-photo { aspect-ratio: 3/4; position: relative; overflow: hidden; background: var(--bg-2); border-radius: var(--radius); }
.trainer-photo .ph { transition: transform 0.6s cubic-bezier(.2,.7,.2,1); }
.trainer:hover .trainer-photo .ph { transform: scale(1.04); }
.trainer-tag {
  position: absolute; top: 16px; left: 16px; z-index: 3;
  font-family: var(--font-mono); font-size: 10px;
  padding: 6px 10px; background: rgba(245,239,228,0.9); color: var(--charcoal);
  letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: var(--radius);
}
.play-btn {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2;
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(245,239,228,0.92); color: var(--burgundy);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; padding-left: 4px;
  box-shadow: 0 10px 40px rgba(28,18,14,0.3);
  transition: all 0.3s ease;
}
.trainer:hover .play-btn { transform: translate(-50%,-50%) scale(1.08); background: var(--accent); color: var(--charcoal); }
.video-duration {
  position: absolute; top: 16px; right: 16px; z-index: 3;
  font-family: var(--font-mono); font-size: 10px;
  padding: 4px 8px; background: var(--charcoal); color: #F5EFE4;
  letter-spacing: 0.1em; border-radius: 2px;
}
.trainer-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(10,10,10,0.95), transparent);
  transform: translateY(20px);
  opacity: 0;
  transition: all 0.35s cubic-bezier(.2,.7,.2,1);
}
.trainer:hover .trainer-overlay { transform: translateY(0); opacity: 1; }
.trainer-info { padding: 20px 0; border-top: 1px solid var(--line); margin-top: 16px; display: flex; justify-content: space-between; align-items: flex-start; }
.trainer-name { font-family: var(--font-display); font-size: 28px; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1; }
.trainer-role { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); margin-top: 8px; }
.trainer-specialty { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
@media (max-width: 900px) { .trainers-row { grid-template-columns: repeat(2, 1fr); } }

/* Journey */
.journey { position: relative; }
.journey-steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; position: relative; }
.journey-steps::before { content: ''; position: absolute; top: 32px; left: 0; right: 0; height: 1px; background: var(--line-2); }
.journey-steps::after { content: ''; position: absolute; top: 33px; left: 0; height: 2px; background: var(--burgundy); width: var(--journey-progress, 0%); transition: width 2s cubic-bezier(.2,.7,.2,1); }
.journey-step { padding: 0 12px; position: relative; }
.journey-step .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--bg); border: 2px solid var(--line-2); margin: 25px 0 32px; position: relative; z-index: 2; transition: all 0.4s; }
.journey-step.active .dot { background: var(--burgundy); border-color: var(--burgundy); box-shadow: 0 0 0 6px rgba(var(--burgundy-rgb),0.15); }
.journey-step .step-num { font-family: var(--font-mono); font-size: 11px; color: var(--accent); letter-spacing: 0.14em; }
.journey-step h3 { font-family: var(--font-display); font-size: 44px; text-transform: uppercase; line-height: 1; margin: 16px 0 12px; }
.journey-step p { font-size: 14px; color: var(--ink-dim); line-height: 1.5; }
@media (max-width: 900px) {
  .journey-steps { grid-template-columns: 1fr; gap: 24px; }
  .journey-steps::before, .journey-steps::after { display: none; }
}

/* Experience */
.exp-grid { display: grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: 180px; gap: 16px; }
.exp-tile { position: relative; overflow: hidden; border: 1px solid var(--line); transition: border-color 0.3s; }
.exp-tile:hover { border-color: var(--accent); }
.exp-tile .ph { width: 100%; height: 100%; }
.exp-tile .tile-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; background: linear-gradient(to top, rgba(10,10,10,0.95), transparent); display: flex; justify-content: space-between; }
.exp-tile .tile-label span:last-child { color: var(--accent); }
.t-a { grid-column: span 3; grid-row: span 2; }
.t-b { grid-column: span 3; }
.t-c { grid-column: span 2; }
.t-d { grid-column: span 4; grid-row: span 2; }
.t-e { grid-column: span 2; }
@media (max-width: 900px) {
  .exp-grid { grid-template-columns: 1fr 1fr; grid-auto-rows: 140px; }
  .t-a, .t-b, .t-c, .t-d, .t-e { grid-column: span 1; grid-row: span 1; }
  .t-a { grid-column: span 2; grid-row: span 2; }
  .t-d { grid-column: span 2; }
}

/* Membership */
.membership {
  background: var(--charcoal);
  color: #F5EFE4;
  border-radius: var(--radius-lg);
  padding: 80px 64px;
  display: grid; grid-template-columns: 1.4fr 1fr;
  gap: 80px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 40px 80px -40px rgba(28,18,14,0.35);
}
.membership .membership-body { color: rgba(245,239,228,0.7); }
.membership h2 .accent { color: var(--accent) !important; }
.slots-widget { background: rgba(245,239,228,0.05); border: 1px solid rgba(245,239,228,0.15); color: #F5EFE4; border-radius: var(--radius); }
.membership::before {
  content: ''; position: absolute;
  top: -80px; right: -80px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(var(--accent-rgb),0.15), transparent 70%);
}
.membership h2 { font-size: clamp(48px, 6vw, 84px); font-family: var(--font-display); text-transform: uppercase; line-height: 0.9; }
.membership h2 .accent { color: var(--accent); }
.membership-body { font-size: 17px; color: var(--ink-dim); line-height: 1.55; margin: 24px 0 36px; max-width: 520px; }
.slots-widget { background: var(--bg); border: 1px solid var(--line-2); padding: 28px; position: relative; z-index: 1; }
.slots-widget .slot-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); }
.slots-widget .slot-count { font-family: var(--font-display); font-size: 96px; line-height: 1; color: var(--accent); margin: 12px 0; }
.slots-widget .slot-sub { font-size: 13px; color: var(--ink); margin-bottom: 24px; }
.slot-bar { height: 4px; background: var(--line); margin-bottom: 20px; overflow: hidden; }
.slot-bar-fill { height: 100%; background: var(--burgundy); width: 70%; animation: slotPulse 2.4s ease-in-out infinite; }
@keyframes slotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.slot-detail { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); }
@media (max-width: 900px) {
  .membership { grid-template-columns: 1fr; padding: 48px 28px; gap: 40px; }
}

/* Location */
.location-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; }
.map-block {
  position: relative; aspect-ratio: 16/11;
  border: 1px solid var(--line);
  background:
    linear-gradient(rgba(var(--accent-rgb),0.03), rgba(var(--accent-rgb),0.03)),
    repeating-linear-gradient(0deg, var(--bg-1) 0 39px, var(--line) 39px 40px),
    repeating-linear-gradient(90deg, var(--bg-1) 0 39px, var(--line) 39px 40px);
  overflow: hidden;
}
.map-block::before {
  content: ''; position: absolute; top: 0; bottom: 0; left: 20%; width: 2px;
  background: linear-gradient(to bottom, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
}
.map-block::after {
  content: ''; position: absolute; top: 30%; left: 0; right: 0; height: 2px;
  background: linear-gradient(to right, transparent, var(--line-2) 20%, var(--line-2) 80%, transparent);
}
.map-pin {
  position: absolute; top: 45%; left: 38%;
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  box-shadow: 0 0 0 8px rgba(var(--accent-rgb),0.15), 0 0 40px rgba(var(--accent-rgb),0.6);
  animation: pinPulse 2s ease-in-out infinite;
}
@keyframes pinPulse { 0%,100% { box-shadow: 0 0 0 8px rgba(var(--accent-rgb),0.15), 0 0 40px rgba(var(--accent-rgb),0.6); } 50% { box-shadow: 0 0 0 16px rgba(var(--accent-rgb),0.08), 0 0 60px rgba(var(--accent-rgb),0.8); } }
.map-label {
  position: absolute; top: 50%; left: 44%;
  transform: translateY(-6px);
  padding: 8px 12px;
  background: var(--bg);
  border: 1px solid var(--accent);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  white-space: nowrap;
}
.map-street {
  position: absolute; bottom: 24px; left: 24px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-dim);
  text-transform: uppercase;
}
.info-block { display: flex; flex-direction: column; gap: 20px; }
.info-row { padding: 20px 0; border-bottom: 1px solid var(--line); }
.info-row:first-child { border-top: 1px solid var(--line); }
.info-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); margin-bottom: 10px; }
.info-value { font-size: 18px; line-height: 1.4; }
.info-value .accent-inline { color: var(--accent); }
@media (max-width: 900px) { .location-grid { grid-template-columns: 1fr; } }

/* Final CTA */
.final-cta {
  min-height: 90vh;
  padding: 160px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-top: 1px solid var(--line);
}
.final-cta {
  background: var(--charcoal);
  color: #F5EFE4;
}
.final-cta::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(800px 500px at 50% 50%, rgba(var(--accent-rgb),0.18), transparent 60%);
}
.final-cta h2 .line-1 .stroke { -webkit-text-stroke: 2px #F5EFE4 !important; color: transparent !important; }
.final-cta h2 .line-2 { color: var(--accent) !important; }
.final-cta h2 {
  font-family: var(--font-display);
  font-size: clamp(80px, 16vw, 260px);
  text-transform: uppercase;
  line-height: 0.88;
  position: relative;
}
.final-cta h2 .line-1 .stroke { -webkit-text-stroke: 2px var(--ink); color: transparent; }
.final-cta h2 .line-2 { color: var(--accent); font-style: italic; }
.final-cta-sub { font-size: 18px; color: var(--ink-dim); max-width: 500px; margin: 40px auto 0; line-height: 1.5; }

/* Placeholder visual */

/* Scroll indicator in hero */
.scroll-hint { position: absolute; bottom: 32px; right: 48px; display: flex; align-items: center; gap: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); }
.scroll-hint .bar { display: inline-block; width: 40px; height: 1px; background: var(--accent); position: relative; overflow: hidden; }
.scroll-hint .bar::after { content: ''; position: absolute; inset: 0; background: var(--bg); animation: scrollbar 2.2s ease-in-out infinite; }
@keyframes scrollbar { 0% { transform: translateX(0); } 50% { transform: translateX(100%); } 50.01% { transform: translateX(-100%); } 100% { transform: translateX(0); } }

@media (max-width: 768px) { .scroll-hint { right: 20px; } }

/* Hero — centered, cinematic */
.hero-centered {
  position: relative;
  min-height: 100vh;
  min-height: 100svh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  overflow: hidden;
  padding: 120px 24px 80px;
}
.hero-bg { position: absolute; inset: 0; z-index: 0; }
.hero-bg-image { position: absolute; inset: -4%; animation: heroZoom 22s ease-in-out infinite alternate; }
.hero-bg-image .ph { width: 100%; height: 100%; border-radius: 0; }
@keyframes heroZoom {
  from { transform: scale(1.0); }
  to   { transform: scale(1.08); }
}
.hero-bg-overlay {
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(28,18,14,0.25) 0%, rgba(28,18,14,0.55) 55%, rgba(28,18,14,0.85) 100%),
    radial-gradient(900px 600px at 50% 40%, rgba(var(--accent-rgb),0.22), transparent 65%);
}
.hero-bg-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(28,18,14,0.5) 100%);
}
.hero-content {
  position: relative; z-index: 2;
  max-width: 860px;
  width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 28px;
  color: #F5EFE4;
}

/* Staggered entrance */
.hero-anim {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 900ms cubic-bezier(.2,.7,.2,1), transform 900ms cubic-bezier(.2,.7,.2,1);
  transition-delay: var(--d, 0ms);
}
.hero-centered.loaded .hero-anim { opacity: 1; transform: translateY(0); }

/* Eyebrow */
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
  padding: 10px 18px;
  border: 1px solid rgba(245,239,228,0.18);
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(245,239,228,0.8);
  background: rgba(245,239,228,0.05);
  backdrop-filter: blur(10px);
}
.hero-eyebrow-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
.hero-eyebrow-sep { color: rgba(245,239,228,0.3); }
.hero-eyebrow-stars { color: var(--accent); letter-spacing: 0; }

/* Headline */
.hero-headline {
  font-family: var(--font-display);
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: -0.01em;
  line-height: 0.92;
  font-size: clamp(44px, 7.6vw, 108px);
  display: flex; flex-direction: column; gap: 0;
  max-width: 16ch;
  text-wrap: balance;
}
.hl-line { display: block; }
.hl-em { color: #F5EFE4; }
.hl-accent { color: var(--accent); font-style: italic; }

/* Subline */
.hero-subline {
  max-width: 56ch;
  font-size: clamp(15px, 1.4vw, 18px);
  line-height: 1.55;
  color: rgba(245,239,228,0.72);
  text-wrap: pretty;
}

/* CTA */
.hero-cta { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-top: 8px; }
.btn-hero-primary {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 20px 34px;
  background: var(--accent);
  color: var(--charcoal);
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: var(--radius);
  position: relative;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  box-shadow: 0 12px 30px -10px rgba(var(--accent-rgb),0.4);
}
.btn-hero-primary::after {
  content: ''; position: absolute; inset: -2px;
  border-radius: calc(var(--radius) + 2px);
  box-shadow: 0 0 0 0 rgba(var(--accent-rgb),0.5);
  pointer-events: none;
  transition: box-shadow 0.4s ease;
}
.btn-hero-primary:hover { transform: translateY(-2px); background: #F5EFE4; box-shadow: 0 18px 40px -12px rgba(var(--accent-rgb),0.55); }
.btn-hero-primary:hover::after { box-shadow: 0 0 0 6px rgba(var(--accent-rgb),0.18); }
.btn-hero-primary .arrow { transition: transform 0.25s ease; }
.btn-hero-primary:hover .arrow { transform: translateX(4px); }

.hero-cta-micro {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(245,239,228,0.65);
}
.hero-cta-micro strong { color: var(--accent); font-weight: 700; letter-spacing: 0.16em; }
.micro-tick {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); color: var(--charcoal);
  font-size: 10px; font-weight: 700;
}

/* Scroll cue */
.hero-scroll {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(245,239,228,0.5);
}
.hero-centered.loaded .hero-scroll { transform: translateX(-50%) translateY(0); }
.scroll-line {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, transparent, rgba(245,239,228,0.6));
  position: relative; overflow: hidden;
}
.scroll-line::after {
  content: ''; position: absolute; inset: 0;
  background: var(--accent);
  animation: scrollDrop 2.4s ease-in-out infinite;
}
@keyframes scrollDrop {
  0% { transform: translateY(-100%); }
  60%, 100% { transform: translateY(100%); }
}

@media (max-width: 640px) {
  .hero-centered { padding: 110px 18px 90px; }
  .hero-headline { line-height: 0.95; }
  .hero-eyebrow { font-size: 10px; padding: 8px 14px; }

  .hero-bg-image { animation: none; }
}
@media (prefers-reduced-motion: reduce) {
  .hero-anim { transition: none; opacity: 1; transform: none; }
  .hero-bg-image { animation: none; }
  .scroll-line::after { animation: none; }
}

.wa-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: var(--charcoal); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--font-display); font-size: 20px; }
.wa-name { font-size: 14px; font-weight: 600; }
.wa-status { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: rgba(245,239,228,0.55); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.wa-dot { width: 6px; height: 6px; border-radius: 50%; background: #25D366; }
.wa-close { width: 28px; height: 28px; border-radius: 50%; color: rgba(245,239,228,0.5); font-size: 20px; line-height: 1; cursor: pointer; }
.wa-close:hover { color: #F5EFE4; background: rgba(245,239,228,0.08); }
.wa-msg { padding: 14px 0 16px; font-size: 14px; line-height: 1.5; color: rgba(245,239,228,0.85); }
.wa-cta { display: block; padding: 12px; background: #25D366; color: #FFF; text-align: center; border-radius: var(--radius); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; transition: background 0.2s; }
.wa-cta:hover { background: #1FB955; }
@media (max-width: 640px) { .wa-card { width: calc(100vw - 48px); } .wa-label { display: none; } .wa-btn { padding: 14px; } }


/* ===== HERO CINEMATIC ===== */
.hero-cine {
  position: relative;
  min-height: 100vh; min-height: 100svh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  overflow: hidden;
  padding: 120px 24px 100px;
  background: #060403;
  color: #F5EFE4;
  isolation: isolate;
}
.hero-bg-stack { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
.hero-bg-layer {
  position: absolute; inset: -8% -4%;
  background-size: cover;
  background-position: center 30%;
  background-repeat: no-repeat;
  will-change: transform, opacity;
}
.hero-bg-far {
  background-image: url('assets/inked-back.jpg');
  filter: blur(6px) brightness(0.32) contrast(1.1) grayscale(0.6);
  transform: scale(1.05);
  opacity: 0.45;
}
.hero-bg-mid {
  background-image: url('assets/manga-warrior.jpg');
  background-position: center 40%;
  filter: blur(2px) brightness(0.45) contrast(1.15) saturate(0.85);
  mix-blend-mode: lighten;
  opacity: 0.55;
}
.hero-bg-near {
  background-image: url('assets/hero-silhouette.jpg');
  background-position: center 20%;
  background-size: contain;
  background-repeat: no-repeat;
  filter: brightness(0.9) contrast(1.18);
  mix-blend-mode: screen;
  opacity: 0.95;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(245,239,228,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,239,228,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at 50% 40%, black 30%, transparent 75%);
  opacity: 0.55;
}
.hero-vignette {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at center, transparent 30%, rgba(6,4,3,0.55) 70%, rgba(6,4,3,0.95) 100%),
    linear-gradient(180deg, rgba(6,4,3,0.4) 0%, transparent 30%, rgba(6,4,3,0.85) 100%);
}
.hero-scanline {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent 0 3px, rgba(245,239,228,0.022) 3px 4px);
  pointer-events: none;
  mix-blend-mode: overlay;
  animation: scanShift 8s linear infinite;
}
@keyframes scanShift { to { background-position: 0 100px; } }

/* Ribbon top */
.ribbon { position: absolute; left: 0; right: 0; z-index: 3; overflow: hidden; pointer-events: none; }
.ribbon-top { top: 60px; transform: rotate(-3deg) translateX(-2%); width: 110%; background: var(--accent); padding: 8px 0; box-shadow: 0 8px 30px -6px rgba(232,131,58,0.5); }
.ribbon-track { display: flex; gap: 64px; white-space: nowrap; animation: ribbonScroll 28s linear infinite; }
.ribbon-track span { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.2em; color: var(--charcoal); font-weight: 700; }
@keyframes ribbonScroll { to { transform: translateX(-50%); } }

/* Watermark */
.hero-watermark {
  position: absolute; left: 50%; bottom: -8%;
  transform: translateX(-50%);
  font-family: var(--font-display);
  font-size: clamp(160px, 28vw, 420px);
  font-weight: 400;
  letter-spacing: -0.02em;
  color: transparent;
  -webkit-text-stroke: 1px rgba(245,239,228,0.06);
  z-index: 1; pointer-events: none;
  line-height: 0.8;
  white-space: nowrap;
}

/* Side index marks */
.hero-index { position: absolute; z-index: 4; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(245,239,228,0.5); display: flex; flex-direction: column; gap: 6px; }
.hero-index-left { left: 32px; top: 50%; transform: translateY(-50%); }
.hero-index-left .big { font-family: var(--font-display); font-size: 56px; line-height: 1; color: var(--accent); letter-spacing: 0; }
.hero-index-right { right: 32px; top: 50%; transform: translateY(-50%); }
.hero-index-right .vert { writing-mode: vertical-rl; transform: rotate(180deg); letter-spacing: 0.4em; }
@media (max-width: 900px) { .hero-index { display: none; } }

/* Content */
.hero-content { position: relative; z-index: 5; max-width: 920px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 28px; }

/* Anim base */
.hero-anim { opacity: 0; transform: translateY(20px); transition: opacity 1000ms cubic-bezier(.2,.7,.2,1), transform 1000ms cubic-bezier(.2,.7,.2,1); transition-delay: var(--d, 0ms); filter: blur(4px); }
.hero-cine.loaded .hero-anim { opacity: 1; transform: translateY(0); filter: blur(0); }

/* Eyebrow */
.hero-eyebrow { display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; padding: 10px 18px; border: 1px solid rgba(245,239,228,0.18); border-radius: 999px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,239,228,0.85); background: rgba(245,239,228,0.04); backdrop-filter: blur(12px); }
.hero-eyebrow-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); animation: pulse 2s ease-in-out infinite; }
.hero-eyebrow-sep { color: rgba(245,239,228,0.3); }
.hero-eyebrow-stars { color: var(--accent); letter-spacing: 0; }

/* Headline */
.hero-headline { font-family: var(--font-display); font-weight: 400; text-transform: uppercase; letter-spacing: -0.01em; line-height: 0.92; font-size: clamp(48px, 8vw, 120px); display: flex; flex-direction: column; gap: 0; max-width: 16ch; text-wrap: balance; text-shadow: 0 4px 30px rgba(0,0,0,0.6); }
.hl-line { display: block; }
.hl-word { display: inline-block; }
.hl-em { color: #F5EFE4; }
.hl-accent { color: var(--accent); font-style: italic; text-shadow: 0 0 40px rgba(232,131,58,0.55); }
.strike { text-decoration: line-through; opacity: 0.5; }

/* Subline */
.hero-subline { max-width: 60ch; font-size: clamp(15px, 1.4vw, 18px); line-height: 1.6; color: rgba(245,239,228,0.78); text-wrap: pretty; text-shadow: 0 2px 20px rgba(0,0,0,0.6); }
.hero-subline strong { color: var(--accent); font-weight: 600; }

/* CTAs */
.hero-cta { display: flex; flex-direction: column; align-items: center; gap: 18px; margin-top: 12px; }
.hero-cta-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: center; }

/* Primary CTA — bulletproof contrast on dark bg */
.cta-pri {
  position: relative;
  display: inline-flex; align-items: stretch;
  padding: 0;
  border-radius: 6px;
  overflow: hidden;
  isolation: isolate;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  box-shadow: 0 0 0 1px rgba(232,131,58,0.4), 0 16px 40px -12px rgba(232,131,58,0.55), 0 0 60px -10px rgba(232,131,58,0.25);
  animation: ctaPulse 2.4s ease-in-out infinite;
}
.cta-pri:hover { transform: translateY(-3px); box-shadow: 0 0 0 1px rgba(232,131,58,0.6), 0 22px 50px -12px rgba(232,131,58,0.7), 0 0 80px -10px rgba(232,131,58,0.4); }
.cta-pri-bg {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #FF9A4A 0%, #E8833A 50%, #B8561F 100%);
}
.cta-pri-text {
  position: relative; z-index: 2;
  display: inline-flex; align-items: center; gap: 14px;
  padding: 22px 36px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #1C0F08;
}
.cta-arrow { display: inline-block; transition: transform 0.3s ease; }
.cta-pri:hover .cta-arrow { transform: translateX(6px); }
.cta-pri-shine {
  position: absolute; top: 0; left: -75%; width: 50%; height: 100%; z-index: 1;
  background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
  transform: skewX(-20deg);
  animation: ctaShine 3.8s ease-in-out infinite;
}
@keyframes ctaShine {
  0%, 100% { left: -75%; }
  60%, 100% { left: 125%; }
}
@keyframes ctaPulse {
  0%, 100% { box-shadow: 0 0 0 1px rgba(232,131,58,0.4), 0 16px 40px -12px rgba(232,131,58,0.55), 0 0 60px -10px rgba(232,131,58,0.25); }
  50% { box-shadow: 0 0 0 1px rgba(232,131,58,0.6), 0 16px 40px -12px rgba(232,131,58,0.7), 0 0 80px -10px rgba(232,131,58,0.4); }
}

/* Secondary CTA */
.cta-sec {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 22px 28px;
  background: rgba(245,239,228,0.06);
  border: 1px solid rgba(245,239,228,0.25);
  color: #F5EFE4;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  border-radius: 6px;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
}
.cta-sec:hover { background: rgba(245,239,228,0.1); border-color: rgba(245,239,228,0.5); transform: translateY(-2px); }
.cta-sec strong { color: var(--accent); letter-spacing: 0.16em; font-weight: 700; }
.cta-sec-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 1.6s ease-in-out infinite; }

.hero-cta-micro { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,239,228,0.7); }
.hero-cta-micro strong { color: var(--accent); font-weight: 700; letter-spacing: 0.16em; }
.micro-tick { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); color: var(--charcoal); font-size: 10px; font-weight: 700; }

/* Scroll cue */
.hero-scroll { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(20px); display: flex; flex-direction: column; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(245,239,228,0.55); z-index: 5; }
.hero-cine.loaded .hero-scroll { transform: translateX(-50%) translateY(0); }
.scroll-line { width: 1px; height: 48px; background: linear-gradient(to bottom, transparent, rgba(245,239,228,0.6)); position: relative; overflow: hidden; }
.scroll-line::after { content: ''; position: absolute; inset: 0; background: var(--accent); animation: scrollDrop 2.4s ease-in-out infinite; }
@keyframes scrollDrop { 0% { transform: translateY(-100%); } 60%, 100% { transform: translateY(100%); } }

@media (max-width: 640px) {
  .hero-cine { padding: 110px 18px 100px; }
  .ribbon-top { top: 70px; }
  .cta-pri-text { padding: 20px 28px; font-size: 12px; }
  .cta-sec { padding: 20px 22px; }
  .hero-watermark { font-size: 140px; }
}
@media (prefers-reduced-motion: reduce) {
  .hero-anim { transition: none; opacity: 1; transform: none; filter: none; }
  .ribbon-track, .scroll-line::after, .cta-pri-shine, .cta-pri, .hero-eyebrow-dot, .cta-sec-dot { animation: none; }
  .hero-bg-layer { transform: none !important; }
}

/* ===== PARALLAX BAND ===== */
.parallax-band {
  position: relative;
  min-height: 70vh;
  display: flex; align-items: center;
  overflow: hidden;
  background: #0E0908;
  color: #F5EFE4;
  isolation: isolate;
}
.pb-image {
  position: absolute; inset: -10%;
  background-size: cover;
  background-position: center;
  will-change: transform;
  filter: brightness(0.55) contrast(1.15) saturate(0.9);
}
.pb-overlay {
  position: absolute; inset: 0;
  background:
    linear-gradient(90deg, rgba(14,9,8,0.95) 0%, rgba(14,9,8,0.5) 60%, rgba(14,9,8,0.85) 100%),
    radial-gradient(ellipse at 30% 50%, transparent 0%, rgba(14,9,8,0.6) 80%);
}
.pb-grain {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent 0 2px, rgba(245,239,228,0.025) 2px 3px);
  mix-blend-mode: overlay;
  pointer-events: none;
}
.pb-content { position: relative; z-index: 2; padding: 80px 0; max-width: 900px; }
.pb-meta { display: inline-flex; align-items: center; gap: 16px; margin-bottom: 28px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(245,239,228,0.6); }
.pb-num { font-family: var(--font-display); font-size: 28px; color: var(--accent); letter-spacing: 0; }
.pb-line { display: inline-block; width: 60px; height: 1px; background: var(--accent); }
.pb-quote { font-family: var(--font-display); font-size: clamp(48px, 7vw, 96px); line-height: 0.95; text-transform: uppercase; letter-spacing: -0.005em; max-width: 22ch; text-wrap: balance; }
.pb-ribbon {
  position: absolute; bottom: 24px; left: -2%;
  width: 104%;
  background: rgba(110,30,43,0.92);
  color: rgba(245,239,228,0.85);
  padding: 6px 0;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  white-space: nowrap;
  overflow: hidden;
  transform: rotate(-1.2deg);
  z-index: 3;
}
.pb-ribbon span { display: inline-block; animation: ribbonScroll 22s linear infinite; padding-right: 64px; }

/* ===== Designed by AKN ===== */
.footer { position: relative; background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%); overflow: hidden; }
.footer-marquee { background: var(--charcoal); color: rgba(245,239,228,0.4); padding: 14px 0; overflow: hidden; }
.fm-track { display: flex; gap: 0; white-space: nowrap; animation: ribbonScroll 36s linear infinite; }
.fm-track span { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.18em; padding-right: 48px; }
.designed-by {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-dim);
}
.db-line { display: inline-block; width: 24px; height: 1px; background: var(--accent); }
.designed-by .db-name {
  font-family: var(--font-display);
  font-size: 18px; letter-spacing: 0.08em;
  color: var(--burgundy);
  position: relative;
  padding: 2px 4px;
  transition: all 0.3s ease;
}
.designed-by .db-name::before {
  content: ''; position: absolute; inset: 0;
  border: 1px solid var(--accent);
  opacity: 0;
  transform: scale(1.15);
  transition: all 0.3s ease;
}
.designed-by .db-name:hover { color: var(--accent); transform: translateY(-1px); }
.designed-by .db-name:hover::before { opacity: 1; transform: scale(1); }
.db-mark { color: var(--accent); animation: pulse 2.6s ease-in-out infinite; }

/* ===== Section reveal animation ===== */
.fx-reveal { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(.2,.7,.2,1), transform 1s cubic-bezier(.2,.7,.2,1); }
.fx-reveal.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
  /* Body / global */
  body { font-size: 15px; }
  .container { padding: 0 18px; }

  /* Nav — pill-floating, compact */
  .nav, .nav.scrolled { padding: 10px 14px !important; gap: 8px; }
  .nav .logo { font-size: 16px !important; }
  .nav-cta { padding: 9px 14px !important; font-size: 10px !important; letter-spacing: 0.1em !important; }
  .nav-links { display: none; }

  /* Urgency bar — even tighter, scrolling */
  .urgency-bar { padding: 8px 0; font-size: 9.5px !important; letter-spacing: 0.08em; }
  .urgency-bar-inner { gap: 6px 10px !important; padding: 0 14px; }
  .ub-item { gap: 5px; }
  .ub-item:nth-child(n+5) { display: none; }

  /* ===== HERO MOBILE ===== */
  .hero-cine {
    min-height: auto;
    padding: 92px 18px 140px !important;
  }
  .hero-bg-near { background-size: 130% auto !important; background-position: center 18% !important; }
  .hero-bg-mid { filter: blur(1px) brightness(0.5) contrast(1.1) saturate(0.85); }

  /* Ribbons compact */
  .ribbon-top { top: 84px !important; padding: 6px 0 !important; }
  .ribbon-track span { font-size: 12px !important; letter-spacing: 0.16em; }

  /* Side index hidden, watermark smaller */
  .hero-index { display: none !important; }
  .hero-watermark { font-size: 110px !important; bottom: -2% !important; }

  /* Eyebrow — pill compact */
  .hero-eyebrow {
    padding: 8px 12px !important;
    font-size: 9.5px !important;
    letter-spacing: 0.1em !important;
    gap: 8px !important;
    flex-wrap: nowrap !important;
  }
  .hero-eyebrow .hero-eyebrow-sep { display: none; }
  .hero-eyebrow > span:nth-child(2) { font-size: 9.5px; }

  /* Headline — tighter */
  .hero-headline {
    font-size: clamp(38px, 11vw, 54px) !important;
    line-height: 0.94 !important;
    max-width: 14ch;
  }

  /* Subline */
  .hero-subline {
    font-size: 14px !important;
    line-height: 1.5 !important;
    max-width: 38ch;

  /* CTAs stack full-width */
  .hero-cta-row {
    flex-direction: column !important;

    gap: 10px !important;
  }
  .cta-pri, .cta-sec {
    width: 100%;

  }
  .cta-pri-text {
    padding: 18px 24px !important;
    font-size: 12px !important;
    letter-spacing: 0.13em !important;
    justify-content: center;
    width: 100%;
  }
  .cta-sec {
    padding: 17px 22px !important;
    font-size: 11px !important;
    letter-spacing: 0.12em;
    justify-content: center;
  }
  .hero-cta-micro {
    font-size: 9.5px !important;
    letter-spacing: 0.1em !important;
    text-align: center;
    line-height: 1.4;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Scroll cue — smaller */
  .hero-scroll { bottom: 16px !important; font-size: 9px; }
  .scroll-line { height: 32px !important; }

  /* ===== Section scaffolding ===== */
  .section { padding: 64px 0 !important; }
  .section-title { font-size: clamp(36px, 9vw, 48px) !important; }

  /* ===== Marquee ===== */

  /* ===== Parallax bands ===== */

  .lead-section { padding: 72px 0 !important; }

  .lead-sub { font-size: 15px !important; margin: 18px 0 !important; }

  .goal-chips { gap: 6px !important; }

  /* ===== Testimonials ===== */
  .testimonials-grid { grid-template-columns: 1fr !important; }
  .testimonial { padding: 28px 22px !important; gap: 18px !important; }

  /* ===== Why ===== */
  .why-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
  .why-lead h2 { font-size: clamp(40px, 10vw, 56px) !important; }
  .why-items { grid-template-columns: 1fr !important; }
  .why-item { min-height: auto !important; padding: 26px 22px !important; }
  .why-item h3 { font-size: 26px !important; margin: 12px 0 !important; }

  /* ===== Trainers — 1 column on mobile for breathing room ===== */
  .trainers-row { grid-template-columns: 1fr !important; gap: 24px !important; }

  /* ===== Journey ===== */
  .journey-steps { grid-template-columns: 1fr !important; gap: 24px !important; }

  .results-grid { grid-template-columns: 1fr !important; gap: 22px !important; }

  /* ===== Experience ===== */
  .exp-grid { grid-template-columns: 1fr 1fr !important; grid-auto-rows: 110px !important; gap: 8px !important; }

  .membership { grid-template-columns: 1fr !important; padding: 32px 22px !important; gap: 28px !important; border-radius: 18px; }

  .wa-card { width: calc(100vw - 28px) !important; right: 0 !important; padding: 16px !important; }

  /* Add bottom padding to body so sticky bar doesn't cover footer last line */
  body { padding-bottom: 0 !important; }

/* ============================================ */
/* ===== STICKY MOBILE BOTTOM CTA BAR ========= */
/* ============================================ */
.mobile-sticky-cta {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 95;
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(6,4,3,0.0) 0%, rgba(6,4,3,0.85) 30%, rgba(6,4,3,0.98) 100%);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  transform: translateY(120%);
  transition: transform 0.45s cubic-bezier(.2,.7,.2,1);
  pointer-events: none;
}
.mobile-sticky-cta.show {
  transform: translateY(0);
  pointer-events: auto;
}
.msc-row {
  display: grid; grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: stretch;
}
.msc-pri {
  position: relative;
  background: linear-gradient(135deg, #FF9A4A 0%, #E8833A 50%, #B8561F 100%);
  color: #1C0F08;
  padding: 14px 16px;
  border-radius: 12px;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.13em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 0 0 1px rgba(232,131,58,0.5), 0 10px 28px -8px rgba(232,131,58,0.55);
  overflow: hidden;
  isolation: isolate;
}
.msc-pri::after {
  content: '';
  position: absolute; top: 0; left: -75%; width: 50%; height: 100%; z-index: 1;
  background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%);
  transform: skewX(-20deg);
  animation: ctaShine 4s ease-in-out infinite;
}
.msc-pri > * { position: relative; z-index: 2; }
.msc-sec {
  background: #25D366;
  color: #FFF;
  width: 52px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 10px 24px -8px rgba(37,211,102,0.6);
}
.msc-sec svg { width: 22px; height: 22px; }
.msc-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: #1C0F08; opacity: 0.7;
  animation: pulse 1.6s ease-in-out infinite;
}
.msc-tag {
  display: block;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(245,239,228,0.55);
  margin-bottom: 6px;
}
.msc-tag strong { color: var(--accent); font-weight: 700; }

@media (max-width: 768px) {
